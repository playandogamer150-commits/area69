version: '3'
services:
  app:
    image: my_app
    ports:
      - '8080:8080'
    environment:
      REDIS_URL: 'redis://:REPLACE_WITH_PASSWORD@redis:6379/0'
      # Other environment variables for the app

  redis:
    image: redis:latest
    environment:
      - REDIS_PASSWORD=REPLACE_WITH_PASSWORD
    # ports: - '6379:6379' # Ports are not exposed for security

  db:
    image: postgres:latest
    environment:
      POSTGRES_PASSWORD: REPLACE_WITH_PASSWORD
    # ports: - '5432:5432' # Ports are not exposed for security